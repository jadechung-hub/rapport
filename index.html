<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>이미지카드 퍼실리테이션</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0f1117;
    --bg-elev: #181b24;
    --bg-elev-2: #20242f;
    --border: #2a2f3d;
    --text: #e8eaf0;
    --text-dim: #8e94a3;
    --gold: #e8b84b;
    --gold-dim: #b8902f;
    --green: #3ecf8e;
    --green-dim: #2aa371;
    --danger: #ff5d5d;
    --shadow: 0 8px 24px rgba(0,0,0,.4);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Pretendard", "Noto Sans KR", Roboto, sans-serif;
    font-size: 15px;
    line-height: 1.5;
    min-height: 100vh;
  }
  a { color: var(--gold); }

  .header {
    position: sticky; top: 0; z-index: 50;
    background: rgba(15,17,23,.92);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px 0;
  }
  .title-row {
    display: flex; align-items: center; justify-content: space-between;
    margin: 0 0 10px;
  }
  .title {
    margin: 0;
    font-size: 18px; font-weight: 700;
    letter-spacing: -.01em;
    display: flex; align-items: center; gap: 8px;
  }
  .title .dot-y { color: var(--gold); }
  .title .dot-g { color: var(--green); }

  .status-badge {
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--bg-elev-2);
    color: var(--text-dim);
    white-space: nowrap;
  }
  .status-badge.cloud { color: var(--green); border-color: rgba(62,207,142,.4); }
  .status-badge.local { color: var(--gold); border-color: rgba(232,184,75,.4); }
  .status-badge.err   { color: var(--danger); border-color: rgba(255,93,93,.4); }

  .tabs { display: flex; gap: 4px; }
  .tab {
    flex: 1;
    background: transparent;
    color: var(--text-dim);
    border: none;
    padding: 12px 8px;
    font-size: 14px; font-weight: 600;
    cursor: pointer;
    border-bottom: 2px solid transparent;
